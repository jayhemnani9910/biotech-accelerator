<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biotech Research Accelerator - Demo</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <div class="logo">
                <span class="logo-icon">🧬</span>
                <h1>Biotech Research Accelerator</h1>
            </div>
            <a href="https://github.com/jayhemnani9910/biotech-accelerator" target="_blank" class="github-link">
                <svg height="24" width="24" viewBox="0 0 16 16" fill="currentColor">
                    <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/>
                </svg>
                View Source
            </a>
        </header>

        <!-- Main Content -->
        <main class="main">
            <!-- Terminal Section -->
            <section class="terminal-section">
                <div class="terminal">
                    <div class="terminal-header">
                        <div class="terminal-buttons">
                            <span class="btn-close"></span>
                            <span class="btn-minimize"></span>
                            <span class="btn-maximize"></span>
                        </div>
                        <span class="terminal-title">biotech-accelerator</span>
                    </div>
                    <div class="terminal-body">
                        <div class="terminal-line prompt">
                            <span class="prompt-symbol">$</span>
                            <span id="query-text" class="query-text"></span>
                            <span class="cursor"></span>
                        </div>
                        <div id="terminal-output" class="terminal-output"></div>
                    </div>
                </div>
            </section>

            <!-- Pipeline Section -->
            <section class="pipeline-section">
                <h2 class="section-title">Pipeline</h2>
                <div class="pipeline">
                    <div class="pipeline-node" id="node-parser">
                        <div class="node-icon">📝</div>
                        <div class="node-label">PARSER</div>
                        <div class="node-status"></div>
                        <div class="node-output"></div>
                    </div>
                    <div class="pipeline-arrow">→</div>
                    <div class="pipeline-node" id="node-uniprot">
                        <div class="node-icon">🔬</div>
                        <div class="node-label">UNIPROT</div>
                        <div class="node-status"></div>
                        <div class="node-output"></div>
                    </div>
                    <div class="pipeline-arrow">→</div>
                    <div class="pipeline-node" id="node-pubmed">
                        <div class="node-icon">📚</div>
                        <div class="node-label">PUBMED</div>
                        <div class="node-status"></div>
                        <div class="node-output"></div>
                    </div>
                    <div class="pipeline-arrow">→</div>
                    <div class="pipeline-node" id="node-structure">
                        <div class="node-icon">🧬</div>
                        <div class="node-label">STRUCTURE</div>
                        <div class="node-status"></div>
                        <div class="node-output"></div>
                    </div>
                    <div class="pipeline-arrow">→</div>
                    <div class="pipeline-node" id="node-synthesis">
                        <div class="node-icon">⚗️</div>
                        <div class="node-label">SYNTHESIS</div>
                        <div class="node-status"></div>
                        <div class="node-output"></div>
                    </div>
                </div>
            </section>

            <!-- Report Section -->
            <section class="report-section" id="report-section">
                <h2 class="section-title">Research Report</h2>
                <div class="report-container">
                    <div id="report-content" class="report-content"></div>
                </div>
            </section>
        </main>

        <!-- Demo Selector -->
        <footer class="demo-selector">
            <span class="demo-label">Try a demo:</span>
            <button class="demo-btn active" data-demo="lysozyme">
                🧪 Lysozyme Stability
            </button>
            <button class="demo-btn" data-demo="egfr">
                💊 EGFR Inhibitors
            </button>
            <button class="demo-btn" data-demo="braf">
                🧬 BRAF Mutations
            </button>
        </footer>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="js/data.js"></script>
    <script src="js/terminal.js"></script>
    <script src="js/pipeline.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
