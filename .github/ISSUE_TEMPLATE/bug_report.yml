name: Bug report
description: Report something that isn't working
labels: [bug]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Describe the bug clearly.
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Include query, code snippet, or command.
      placeholder: |
        1. Run `...`
        2. See error `...`
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version / commit
      placeholder: e.g. 0.1.0 or a1b2c3d
    validations:
      required: true

  - type: input
    id: python
    attributes:
      label: Python version
      placeholder: "3.11"
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs / traceback
      render: shell
